<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Quality AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #imagePreview {
            max-height: 300px;
            object-fit: contain;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="gradient-bg text-white py-10 shadow-lg mb-10">
        <div class="container mx-auto text-center">
            <h1 class="text-4xl font-bold mb-2"><i class="fas fa-apple-alt mr-3"></i>AI Food Quality Inspector</h1>
            <p class="text-lg opacity-90">Machine Learning based Fresh & Rotten Food Identification</p>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-4xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-8 rounded-2xl shadow-md">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Upload Image</h2>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-indigo-500 transition">
                    <input type="file" id="imageInput" class="hidden" accept="image/*">
                    <label for="imageInput" class="cursor-pointer">
                        <i class="fas fa-cloud-upload-alt text-4xl text-indigo-500 mb-3"></i>
                        <p class="text-gray-500">Click to upload or drag and drop</p>
                        <p class="text-xs text-gray-400 mt-1">Supports: JPG, PNG, AVIF</p>
                    </label>
                </div>
                <button id="predictBtn" class="w-full mt-6 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition flex justify-center items-center shadow-lg">
                    <span>Analyze Food</span>
                </button>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-md flex flex-col items-center justify-center min-h-[350px]">
                <div id="previewContainer" class="hidden w-full text-center">
                    <h2 class="text-lg font-semibold mb-4 text-gray-700">Image Preview</h2>
                    <img id="imagePreview" src="#" alt="Preview" class="rounded-lg mx-auto shadow-sm mb-4">
                    
                    <div id="resultBox" class="hidden mt-4 p-4 rounded-xl border-2">
                        <p class="text-sm uppercase tracking-widest text-gray-500 font-bold">Analysis Result</p>
                        <h3 id="predictionText" class="text-2xl font-black mt-1">---</h3>
                    </div>
                </div>

                <div id="emptyState" class="text-center text-gray-400">
                    <i class="fas fa-microscope text-5xl mb-3"></i>
                    <p>Analysis results will appear here</p>
                </div>
            </div>
        </div>

        <div class="mt-12 flex justify-center pb-10">
            <div class="bg-green-50 p-6 rounded-xl border border-green-100 flex items-center max-w-md shadow-sm">
                <i class="fas fa-check-circle text-green-600 text-3xl mr-4"></i>
                <div>
                    <h4 class="font-bold text-lg">Multi-Class Support</h4>
                    <p class="text-sm text-gray-600">Optimized for Apples, Bananas, and Oranges</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewContainer = document.getElementById('previewContainer');
        const emptyState = document.getElementById('emptyState');
        const predictBtn = document.getElementById('predictBtn');
        const resultBox = document.getElementById('resultBox');
        const predictionText = document.getElementById('predictionText');

        imageInput.onchange = evt => {
            const [file] = imageInput.files;
            if (file) {
                imagePreview.src = URL.createObjectURL(file);
                previewContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
                resultBox.classList.add('hidden');
            }
        }

        predictBtn.onclick = async () => {
            if (imageInput.files.length === 0) {
                alert("Please select an image first!");
                return;
            }

            const formData = new FormData();
            formData.append('file', imageInput.files[0]);

            predictBtn.disabled = true;
            predictBtn.innerHTML = '<div class="loading-spinner"></div>';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.prediction) {
                    resultBox.classList.remove('hidden');
                    predictionText.innerText = data.prediction;
                    
                    if (data.prediction.toLowerCase().includes('fresh')) {
                        resultBox.className = "mt-4 p-4 rounded-xl border-2 border-green-500 bg-green-50 text-green-700";
                    } else {
                        resultBox.className = "mt-4 p-4 rounded-xl border-2 border-red-500 bg-red-50 text-red-700";
                    }
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong with the server.");
            } finally {
                predictBtn.disabled = false;
                predictBtn.innerHTML = '<span>Analyze Food</span>';
            }
        };
    </script>
</body>
</html>
